name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run simulation to generate plots
        run: |
          mkdir -p plots/spad
          python -m src
          echo "Plots generated:"
          ls plots/spad/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy artifacts into deploy directory
        run: |
          mkdir -p deploy/data deploy/plots/spad
          cp data/device_sagcm.xml data/materials.xml data/plots_config.xml deploy/data/
          cp plots/spad/*.png deploy/plots/spad/
          cp docs/index.html docs/_config.yml deploy/
          cp docs/guide.html docs/iitd.png docs/qmd.jpeg deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
